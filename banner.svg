<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #0f0f23; stop-opacity: 1;" />
      <stop offset="50%" style="stop-color: #1a1a3e; stop-opacity: 1;" />
      <stop offset="100%" style="stop-color: #0f0f23; stop-opacity: 1;" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#gradient)" />

  <!-- Animated particle stream 1 -->
  <circle cx="150" cy="400" r="2" fill="#00d4ff">
    <animate attributeName="cy" from="400" to="0" dur="4s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" />
    <animate attributeName="r" values="2;2;1;0" dur="4s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="200" cy="400" r="2" fill="#00d4ff">
    <animate attributeName="cy" from="400" to="-20" dur="5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;1;0" dur="5s" repeatCount="indefinite" />
    <animate attributeName="r" values="2;2;1;0" dur="5s" repeatCount="indefinite" />
    <animate attributeName="cx" from="200" to="230" dur="5s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="300" cy="400" r="2" fill="#00d4ff">
    <animate attributeName="cy" from="400" to="0" dur="4.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;1;0" dur="4.5s" repeatCount="indefinite" />
    <animate attributeName="r" values="2;2;1;0" dur="4.5s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="450" cy="400" r="2" fill="#00d4ff">
    <animate attributeName="cy" from="400" to="-30" dur="5.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;1;0" dur="5.5s" repeatCount="indefinite" />
    <animate attributeName="r" values="2;2;1;0" dur="5.5s" repeatCount="indefinite" />
    <animate attributeName="cx" from="450" to="480" dur="5.5s" repeatCount="indefinite" />
  </circle>

  <!-- Animated particle stream 2 -->
  <circle cx="850" cy="400" r="2" fill="#00d4ff">
    <animate attributeName="cy" from="400" to="0" dur="6s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;1;0" dur="6s" repeatCount="indefinite" />
    <animate attributeName="r" values="2;2;1;0" dur="6s" repeatCount="indefinite" />
    <animate attributeName="cx" from="850" to="820" dur="6s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="950" cy="400" r="2" fill="#00d4ff">
    <animate attributeName="cy" from="400" to="-20" dur="5.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;1;0" dur="5.5s" repeatCount="indefinite" />
    <animate attributeName="r" values="2;2;1;0" dur="5.5s" repeatCount="indefinite" />
    <animate attributeName="cx" from="950" to="920" dur="5.5s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="1050" cy="400" r="2" fill="#00d4ff">
    <animate attributeName="cy" from="400" to="0" dur="6.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;1;0" dur="6.5s" repeatCount="indefinite" />
    <animate attributeName="r" values="2;2;1;0" dur="6.5s" repeatCount="indefinite" />
    <animate attributeName="cx" from="1050" to="1020" dur="6.5s" repeatCount="indefinite" />
  </circle>

  <!-- Decorative lines -->
  <line x1="150" y1="150" x2="350" y2="150" stroke="#00d4ff" stroke-width="3">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" />
  </line>
  
  <line x1="850" y1="250" x2="1050" y2="250" stroke="#00d4ff" stroke-width="3">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" />
  </line>

  <!-- Next.js Logo (left side) - Rotating -->
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="rotate" values="0 70 70;360 70 70" dur="20s" repeatCount="indefinite" />
    <circle cx="70" cy="70" r="50" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3" />
    <circle cx="70" cy="70" r="35" fill="none" stroke="#ffffff" stroke-width="2" />
    <text x="70" y="78" font-size="32" font-weight="bold" fill="white" text-anchor="middle">N</text>
  </g>

  <!-- React Logo (right side) - Rotating reverse -->
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="rotate" values="360 1130 70;0 1130 70" dur="20s" repeatCount="indefinite" />
    <circle cx="1130" cy="70" r="50" fill="none" stroke="#61dafb" stroke-width="1" opacity="0.3" />
    <circle cx="1130" cy="70" r="35" fill="none" stroke="#61dafb" stroke-width="2" />
    <!-- Electron orbits -->
    <ellipse cx="1130" cy="70" rx="20" ry="8" fill="none" stroke="#61dafb" stroke-width="1" opacity="0.5" />
    <ellipse cx="1130" cy="70" rx="12" ry="18" fill="none" stroke="#61dafb" stroke-width="1" opacity="0.5" transform="rotate(60 1130 70)" />
    <ellipse cx="1130" cy="70" rx="12" ry="18" fill="none" stroke="#61dafb" stroke-width="1" opacity="0.5" transform="rotate(-60 1130 70)" />
    <!-- Center dot -->
    <circle cx="1130" cy="70" r="3" fill="#61dafb" />
  </g>

  <!-- Main title -->
  <text x="600" y="160" font-size="72" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2" filter="url(#glow)">MIGUELANGEL RESTREPO</text>

  <!-- Subtitle -->
  <text x="600" y="230" font-size="28" fill="#e0e0e0" text-anchor="middle" letter-spacing="1">Full Stack Developer</text>

  <!-- Bottom accent line -->
  <line x1="300" y1="280" x2="900" y2="280" stroke="#00d4ff" stroke-width="3" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2s" repeatCount="indefinite" />
  </line>

  <!-- Tech keywords -->
  <text x="600" y="330" font-size="16" fill="#00d4ff" text-anchor="middle" letter-spacing="3" filter="url(#glow)">REACT • NODE.JS • TYPESCRIPT • SCRUM</text>
</svg>